name: Release

on:
  push:
    tags:
      - "v*"
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          # Windows
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
          - goos: windows
            goarch: arm64
            suffix: windows-arm64.exe
          # macOS
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: go.sum

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          # Disable CGO for cross-compilation (all non-linux/amd64 targets)
          CGO_ENABLED: ${{ (matrix.goos == 'linux' && matrix.goarch == 'amd64') && '1' || '0' }}
          GO111MODULE: on
        run: |
          output="xsh-${{ matrix.suffix }}"
          go build -ldflags="-s -w -X github.com/benoitpetit/xsh/cmd.Version=${{ github.ref_name }}" -o "$output" .

          # Also create compressed archive as alternative
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            zip "$output.zip" "$output"
          else
            tar czf "$output.tar.gz" "$output"
          fi

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xsh-binary-${{ matrix.suffix }}
          path: ./xsh-${{ matrix.suffix }}

      - name: Upload Archive Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xsh-archive-${{ matrix.suffix }}
          path: ./xsh-${{ matrix.suffix }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Binary Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts/binaries
          pattern: xsh-binary-*
          merge-multiple: true

      - name: Download Archive Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts/archives
          pattern: xsh-archive-*
          merge-multiple: true

      - name: Organize Artifacts
        run: |
          mkdir -p ./release-assets
          # Move binaries (primary)
          cp ./artifacts/binaries/xsh-* ./release-assets/ 2>/dev/null || true
          # Move archives (alternative)
          cp ./artifacts/archives/xsh-* ./release-assets/ 2>/dev/null || true
          ls -la ./release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ./release-assets/*
          draft: false
          prerelease: false
          generate_release_notes: true
          name: "Release ${{ github.ref_name }}"

      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Built for 6 platforms:" >> $GITHUB_STEP_SUMMARY
          echo "- Linux (amd64, arm64)" >> $GITHUB_STEP_SUMMARY
          echo "- Windows (amd64, arm64)" >> $GITHUB_STEP_SUMMARY
          echo "- macOS (amd64, arm64)" >> $GITHUB_STEP_SUMMARY
